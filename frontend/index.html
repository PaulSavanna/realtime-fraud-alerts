<!DOCTYPE html>
<html>
<head>
    <title>Fraud Alerts</title>
    <style>
        body { font-family: monospace; margin: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f5f5f5; }
    </style>
</head>
<body>
    <h1>Fraud Alerts Dashboard</h1>
    <p>Статус: <span id="status">connecting...</span></p>
    <div id="stats">
        <p>За последний час: <span id="hourly-count">0</span> транзакций</p>
        <p>Подозрительных: <span id="suspicious-count">0</span></p>
    </div>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>User</th>
                <th>Amount</th>
                <th>Time</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="transactions"></tbody>
    </table>

    <script>
        let ws;
        let reconnectAttempts = 0;
        const transactions = [];

        function connect() {
            ws = new WebSocket(`ws://${location.host}/ws`);

            ws.onopen = () => {
                document.getElementById('status').textContent = 'connected';
                document.getElementById('status').style.color = 'green';
                reconnectAttempts = 0;
            };

            ws.onclose = () => {
                document.getElementById('status').textContent = 'reconnecting...';
                document.getElementById('status').style.color = 'orange';
                const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
                reconnectAttempts++;
                setTimeout(connect, delay);
            };

            let pendingTx = [];
            let renderTimeout = null;

            ws.onmessage = (event) => {
                const tx = JSON.parse(event.data);
                pendingTx.push(tx);
                if (!renderTimeout) {
                    renderTimeout = setTimeout(() => {
                        pendingTx.forEach(t => {
                            transactions.unshift(t);
                            if (transactions.length > 50) transactions.pop();
                        });
                        pendingTx = [];
                        renderTable();
                        updateStats();
                        renderTimeout = null;
                    }, 300);
                }
            };
        }

        function updateStats() {
            const oneHourAgo = Date.now() / 1000 - 3600;
            const recent = transactions.filter(t => t.timestamp > oneHourAgo);
            document.getElementById('hourly-count').textContent = recent.length;
            document.getElementById('suspicious-count').textContent =
                recent.filter(t => t.status === 'suspicious').length;
        }

        function renderTable() {
            const tbody = document.getElementById('transactions');
            tbody.innerHTML = '';
            transactions.forEach(tx => {
                const row = document.createElement('tr');
                if (tx.status === 'suspicious') {
                    row.style.backgroundColor = '#ffe0e0';
                }
                row.innerHTML = `
                    <td>${tx.id}</td>
                    <td>${tx.user_id}</td>
                    <td>$${tx.amount}</td>
                    <td>${new Date(tx.timestamp * 1000).toLocaleTimeString()}</td>
                    <td>${tx.status}</td>
                `;
                tbody.appendChild(row);
            });
        }

        connect();
    </script>
</body>
</html>
