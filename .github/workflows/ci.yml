name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -v

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t realtime-fraud-alerts .

      - name: Verify container starts
        run: |
          docker run -d --name test-container -p 8000:8000 realtime-fraud-alerts
          sleep 5
          curl -f http://localhost:8000/transactions || exit 1
          docker stop test-container
